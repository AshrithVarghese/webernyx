<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: System Breach | Webernyx</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/utilities.css">

    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .error-container {
            z-index: 2;
            max-width: 600px;
        }

        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
            letter-spacing: -5px;
        }

        /* Glitch Effect */
        .error-code::before,
        .error-code::after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .error-code::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .error-code::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(89px, 9999px, 13px, 0); }
            80% { clip: rect(54px, 9999px, 21px, 0); }
            100% { clip: rect(77px, 9999px, 86px, 0); }
        }

        .terminal-box {
            background: rgba(15, 15, 20, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-top: -20px;
            backdrop-filter: blur(10px);
            font-family: 'JetBrains Mono', monospace;
        }

        .terminal-header {
            color: #ff4a4a;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .error-msg {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .recovery-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .recovery-btn {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .recovery-btn:hover {
            border-color: var(--primary);
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .recovery-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <section class="error-page">
        <div class="error-container">
            <div class="glitch-wrapper">
                <h1 class="error-code">404</h1>
            </div>
            
            <div class="terminal-box">
                <div class="terminal-header">
                    <i class="ph ph-warning-octagon"></i>
                    <span>CRITICAL_ERROR: PAGE_NOT_FOUND</span>
                </div>
                <p class="error-msg">The requested resource could not be located on the Webernyx production server. The link may be broken or the directory has moved.</p>
                
                <div class="recovery-links">
                    <a href="index.html" class="recovery-btn">
                        <i class="ph ph-house"></i> Return Home
                    </a>
                    <a href="services.html" class="recovery-btn">
                        <i class="ph ph-code"></i> Services
                    </a>
                    <a href="portfolio.html" class="recovery-btn">
                        <i class="ph ph-briefcase"></i> Portfolio
                    </a>
                    <a href="contact.html" class="recovery-btn">
                        <i class="ph ph-chat-centered-text"></i> Support
                    </a>
                </div>
            </div>

            <p style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-muted); font-family: 'JetBrains Mono';">
                HTTP_STATUS: 404 | DOMAIN: WEBERNYX.COM
            </p>
        </div>
    </section>

    <script src="js/theme.js"></script>
</body>
</html>
